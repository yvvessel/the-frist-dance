<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Frist Dance</title>
    <link
      rel="icon"
      href="./assets/images/thefristlogo.jpg"
      type="image/x-icon"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style/style.css" />
  </head>

  <body>
    <header>
      <div class="container_head">
        <a href="index.html"
          ><img
            src="./assets/images/thefristlogo.jpg"
            alt="logo The Frist Dance"
            class="logo"
        /></a>

        <nav class="menu">
          <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="../pages/stats.html">Estatísticas</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- DIV banner -->
    <section class="banner">
      <div class="overlay">
        <div class="conteudo_banner">
          <h1>THE FRIST DANCE</h1>
        </div>
      </div>
    </section>

    <section class="players_container">
      <div class="player_card" data-player="Xanxes">
        <section class="clove_card"></section>
        <h3>Xanxes</h3>

        <img id="ranking-xanxes" class="rank_logo" alt="Rank Xanxes" />
        <p id="rank-xanxes">Carregando...</p>
      </div>

      <div class="player_card" data-player="Ferazor">
        <section class="phoenix_card"></section>
        <h3>Ferazor</h3>

        <img id="ranking-ferazor" class="rank_logo" alt="Rank Ferazor" />
        <p id="rank-ferazor">Carregando...</p>
      </div>

      <div class="player_card" data-player="yvv">
        <section class="jett_card"></section>
        <h3>yvv</h3>

        <img id="ranking-yvv" class="rank_logo" alt="Rank yvv" />
        <p id="rank-yvv">Carregando...</p>
      </div>

      <div class="player_card" data-player="tinyrick">
        <section class="chamber_card"></section>
        <h3>tinyrick</h3>

        <img id="ranking-tinyrick" class="rank_logo" alt="Rank Tinyrick" />
        <p id="rank-tinyrick">Carregando...</p>
      </div>

      <div class="player_card" data-player="T1n Doll">
        <section class="viper_card"></section>
        <h3>T1n Doll</h3>

        <img id="ranking-t1ndoll" class="rank_logo" alt="Rank T1n Doll" />

        <p id="rank-t1ndoll">Carregando...</p>
      </div>
    </section>

    <footer>
      <div class="footer_base">
        <p>
          &copy;<span id="ano"></span> The Frist Dance by yvv - Todos os
          direitos reservados.
        </p>
      </div>
    </footer>

    <script src="../js/script.js"></script>
  </body>
</html>
